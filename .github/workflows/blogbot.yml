name: Blog Bot

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install libraries
      run: |
        pip install -r requirements.txt

    - name: Run bot
      run: |
        python main.py
